# ═══════════════════════════════════════════════════
# AAM BACKUP AUTOMATION V1 — CONFIGURATION TEMPLATE
# ═══════════════════════════════════════════════════
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored — it will never be committed.
# ═══════════════════════════════════════════════════

firm_name: "Your Firm Name"

# ═══════════════════════════════════════════════════
# FILE SYSTEM PATHS
# ═══════════════════════════════════════════════════
paths:
  source_drive: "D:\\"
  lan_destination: "\\\\YOUR_SERVER_IP\\backup_share"
  database_path: "C:\\BackupAgent\\manifest.db"
  log_directory: "C:\\BackupAgent\\logs"
  temp_directory: "C:\\BackupAgent\\rclone_temp"
  gcs_key_path: "C:\\BackupAgent\\gcs-key.json"

# --- LAN BACKUP ---
lan:
  enabled: true
  retry_count: 3
  retry_wait_seconds: 10
  subprocess_timeout_seconds: 14400
  shutdown_after_backup: true
  max_attempts: 2
  retry_delay_seconds: 600
  mt_threads: 8

# ═══════════════════════════════════════════════════
# WAKE-ON-LAN
# ═══════════════════════════════════════════════════
wol:
  enabled: true
  mac_address: "AA-BB-CC-DD-EE-FF"
  server_ip: "192.168.1.10"
  wake_timeout_seconds: 300
  ping_interval_seconds: 15
  stability_wait_seconds: 30

# ═══════════════════════════════════════════════════
# CLOUD BACKUP (GCS)
# ═══════════════════════════════════════════════════
cloud:
  enabled: true
  bucket: "your-gcs-bucket"
  project_number: "000000000000"
  location: "asia-south1"
  storage_class: "COLDLINE"
  bandwidth_limit: "10M"
  retry_count: 3
  subprocess_timeout_seconds: 21600
  max_attempts: 3
  retry_delay_seconds: 300
  verify_timeout_seconds: 600
  transfers: 4
  checkers: 16

# ═══════════════════════════════════════════════════
# SCHEDULES
# ═══════════════════════════════════════════════════
schedule:
  cloud_cron: "0 18 * * *"
  lan_cron: "0 1 * * *"
  weekly_cron: "0 8 * * MON"
  monthly_cron: "0 8 1 * *"
  timezone: "Asia/Kolkata"

# ═══════════════════════════════════════════════════
# DASHBOARD UI
# ═══════════════════════════════════════════════════
dashboard:
  auth_enabled: true
  api_key: "generate-a-random-key-here"
  bind_address: "127.0.0.1"
  port: 8080

# ═══════════════════════════════════════════════════
# NOTIFICATIONS
# ═══════════════════════════════════════════════════
notifications:
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  sender: ""
  recipients: []
  send_on_failure: false
  send_on_success: false
  weekly_summary_day: "monday"
  weekly_summary_time: "08:00"
