# ═══════════════════════════════════════════════════
# AAM BACKUP AUTOMATION V1 — CONFIGURATION
# ═══════════════════════════════════════════════════
# Edit this file to change any setting.
# Restart the serve.py process after changes.
# ═══════════════════════════════════════════════════

firm_name: "AAM"

# ═══════════════════════════════════════════════════
# FILE SYSTEM PATHS
# ═══════════════════════════════════════════════════
paths:
  source_drive: "E:\\test_backup"
  lan_destination: "\\\\10.10.186.231\\lan_backup"
  database_path: "C:\\Users\\Administrator\\Desktop\\testing\\AAM_BACKUP_V1\\manifest.db"
  log_directory: "C:\\Users\\Administrator\\Desktop\\testing\\AAM_BACKUP_V1\\logs"
  temp_directory: "C:\\Users\\Administrator\\Desktop\\testing\\AAM_BACKUP_V1\\rclone_temp"
  gcs_key_path: "C:\\Users\\Administrator\\Desktop\\testing\\AAM_BACKUP_V1\\aam-demo-gcs-d9427ae2cacc.json"

# ═══════════════════════════════════════════════════
# LAN BACKUP
# ═══════════════════════════════════════════════════
lan:
  enabled: true
  retry_count: 3
  retry_wait_seconds: 10
  subprocess_timeout_seconds: 14400
  shutdown_after_backup: true

# ═══════════════════════════════════════════════════
# WAKE-ON-LAN
# ═══════════════════════════════════════════════════
wol:
  enabled: true
  mac_address: "6C-4B-90-25-70-5F"
  server_ip: "10.10.186.231"
  wake_timeout_seconds: 300
  ping_interval_seconds: 15
  stability_wait_seconds: 30

# ═══════════════════════════════════════════════════
# CLOUD BACKUP (GCS)
# ═══════════════════════════════════════════════════
cloud:
  enabled: true
  bucket: "aam-backup-demo-innovizta"
  project_number: "920173882190"
  location: "asia-south1"
  storage_class: "COLDLINE"
  bandwidth_limit: "10M"
  retry_count: 3
  subprocess_timeout_seconds: 21600

# ═══════════════════════════════════════════════════
# NOTIFICATIONS
# ═══════════════════════════════════════════════════
notifications:
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  sender: ""
  recipients: []
  send_on_failure: false
  send_on_success: false
  weekly_summary_day: "monday"
  weekly_summary_time: "08:00"
